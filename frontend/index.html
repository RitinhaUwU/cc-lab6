<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MEI-CM - Cloud Computing - Dashboard</title>
    <style>body { font-family: Arial, sans-serif; padding: 40px; background: #eef2f3; }</style>
</head>
<body>
    <h1>Frontend Web Server</h1>
    <p>API Status: <strong id="status">Loading...</strong></p>
    <p>Message from Backend: <span id="data">Waiting...</span></p>

    <script>
        fetch('http://api.meicm.pt/data')
            .then(response => response.json())
            .then(data => {
                document.getElementById('status').innerText = "Connected via Edge Router!";
                document.getElementById('status').style.color = "green";
                document.getElementById('data').innerText = data.message;
            })
            .catch(err => {
                document.getElementById('status').innerText = "Disconnected";
                document.getElementById('status').style.color = "red";
            });
    </script>
</body>
</html>
