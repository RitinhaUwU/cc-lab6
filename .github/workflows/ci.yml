name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the API Docker image
      run: docker build ./api --tag api:$(date +%s)

    - name: set lower case owner name
      run: |
        echo "ACTOR_LC=${ACTOR_LC,,}" >>${GITHUB_ENV}
      env:
        ACTOR_LC: '${{ github.actor }}'

    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ ACTOR_LC }}
        password: ${{ secrets.ACTIONS_MAKE_PACKAGES }}

    - uses: docker/build-push-action@v5
      with:
        context: ./api
        push: true
        tags: ghcr.io/${{ ACTOR_LC }}/cc-cloud-api:latest


    - uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ghcr.io/${{ ACTOR_LC }}/cc-cloud-frontend:latest

