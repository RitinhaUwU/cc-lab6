services:

  proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./data/npm:/data
      - ./data/letsencrypt:/etc/letsencrypt

  adminer:
    image: adminer


  frontend:
    image: ghcr.io/ritinhauwu/cc-cloud-frontend:latest

  api:
    image: ghcr.io/ritinhauwu/cc-cloud-api:latest
    environment:
      - PORT=3000
      - DB_HOST=postgres-db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=cloud_db
      - S3_ACCESS_KEY=rtuser
      - S3_SECRET_KEY=password
    depends_on:
      - postgres-db

  postgres-db:
    image: postgres:alpine
    environment:
      - POSTGRES_DB=cloud_db
      - POSTGRES_PASSWORD=password
    volumes:
      - ./volumes/postgres:/var/lib/postgresql

  minio-storage:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    environment:
      - MINIO_ROOT_USER=rtuser
      - MINIO_ROOT_PASSWORD=password
    volumes:
      - ./volumes/minio:/data
    command: 'server /data --console-address ":9001"'